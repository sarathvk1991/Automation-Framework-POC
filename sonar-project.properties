sonar.projectKey=Automation-POC
sonar.projectName=Automation-framework

sonar.sources=src/main/java
sonar.tests=src/test/java

sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports
sonar.externalIssuesReportPaths=sonar-custom-qa-issues.json

#Exclude false positive issues from SonarQube analysis
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S2187
sonar.issue.ignore.multicriteria.e1.resourceKey=**/src/test/java/com/automation/base/BaseTest.java