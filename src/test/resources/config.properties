# Browser to launch (chrome | firefox | edge). Override at runtime: -Dbrowser=firefox
browser=chrome

# Run browser without a visible UI. Override at runtime: -Dheadless=true
headless=false

# Base URL of the application under test
base.url=https://www.saucedemo.com

# Implicit wait in seconds (applied globally to WebDriver)
implicit.wait=10

# Explicit wait in seconds (used by WebDriverWait in page objects)
explicit.wait=60

# Test data — externalised to avoid hardcoded values in source code
test.username=standard_user
test.password=secret_sauce
test.product.backpack=Sauce Labs Backpack
test.product.bike_light=Sauce Labs Bike Light
test.first_name=Sarath
test.last_name=Tester
test.zip_code=695001
